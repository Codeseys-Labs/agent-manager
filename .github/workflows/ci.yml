name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Type check (src/ only)
        run: |
          # Full tsc output, then fail only if src/ files have errors.
          # Known upstream issues: silvery ships .ts in node_modules,
          # citty Resolvable types cause errors in test files.
          OUTPUT=$(bun x tsc --noEmit --skipLibCheck 2>&1 || true)
          SRC_ERRORS=$(echo "$OUTPUT" | grep '^src/' || true)
          if [ -n "$SRC_ERRORS" ]; then
            echo "$SRC_ERRORS"
            echo "::error::TypeScript errors found in src/"
            exit 1
          fi
          echo "Type check passed (src/ clean)"
      - name: Lint
        run: bun run lint
      - name: Test with coverage
        run: |
          set +e
          OUTPUT=$(bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --config=/dev/null 2>&1)
          echo "$OUTPUT"
          # CODEX-13 (2026-05-02): hardening parity with build-verify job
          # (ci.yml:65-88). Even though this job runs on Linux-only and
          # shouldn't see CRLF today, Bun output-format regressions or a
          # future matrix expansion would silently false-success here. Apply
          # the same tr -d '\r' + dual-line-check pattern defensively.
          # Inputs are from `bun test` stdout — no injection surface.
          OUTPUT_LF=$(printf '%s' "$OUTPUT" | tr -d '\r')
          FAIL_LINE=$(echo "$OUTPUT_LF" | grep -E '^ [0-9]+ fail$' | tail -1)
          FAIL_COUNT=$(echo "$FAIL_LINE" | awk '{print $1}')
          PASS_LINE=$(echo "$OUTPUT_LF" | grep -E '^ [0-9]+ pass$' | tail -1)
          if [ -z "$FAIL_LINE" ] && [ -z "$PASS_LINE" ]; then
            echo "::error::Test output did not contain a pass/fail summary line — treat as failure"
            exit 1
          fi
          if [ -n "$FAIL_COUNT" ] && [ "$FAIL_COUNT" != "0" ] && [ "$FAIL_COUNT" != "" ]; then
            echo "::error::$FAIL_COUNT test(s) failed"
            exit 1
          fi
      - name: Coverage summary
        if: always()
        uses: livewing/lcov-job-summary@v1.2.0
        with:
          lcov: coverage/lcov.info
      - name: Coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
      - name: Build all targets (smoke test)
        run: bun run build -- --all

  build-verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-2vcpu-ubuntu-2404
          - os: blacksmith-6vcpu-macos-latest
          # Windows is a first-class platform (install.sh:158-160, build.ts ALL_TARGETS,
          # bin/am.js maps win32). It used to be continue-on-error:true here, which meant
          # a broken Windows build never failed CI ("unknown by construction"). It is now
          # a hard-failing leg, and `integration-windows` below smoke-tests the actual
          # compiled .exe end-to-end. Do NOT reintroduce continue-on-error without also
          # downgrading Windows to "experimental" in the README.
          - os: blacksmith-2vcpu-windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Run tests
        shell: bash
        run: |
          set +e
          OUTPUT=$(bun test 2>&1)
          echo "$OUTPUT"
          # CRLF hardening (2026-05-02 adversarial-review fix). Bun on
          # Windows may emit the summary line with CRLF; the old grep's
          # '$' anchor wouldn't match, FAIL_COUNT would be empty, and the
          # script would exit 0 = false success even if every test failed.
          # Inputs here (OUTPUT) are from `bun test` stdout, not from any
          # GitHub event payload — no injection surface.
          OUTPUT_LF=$(printf '%s' "$OUTPUT" | tr -d '\r')
          FAIL_LINE=$(echo "$OUTPUT_LF" | grep -E '^ [0-9]+ fail$' | tail -1)
          FAIL_COUNT=$(echo "$FAIL_LINE" | awk '{print $1}')
          # Defense-in-depth: if we can't find a fail line AND we can't find
          # a pass line either, the output is malformed — treat as failure.
          PASS_LINE=$(echo "$OUTPUT_LF" | grep -E '^ [0-9]+ pass$' | tail -1)
          if [ -z "$FAIL_LINE" ] && [ -z "$PASS_LINE" ]; then
            echo "::error::Test output did not contain a pass/fail summary line — treat as failure"
            exit 1
          fi
          if [ -n "$FAIL_COUNT" ] && [ "$FAIL_COUNT" != "0" ] && [ "$FAIL_COUNT" != "" ]; then
            echo "::error::$FAIL_COUNT test(s) failed"
            exit 1
          fi

  integration:
    needs: test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile

      - name: Build binary
        run: VERSION=ci-test bun run build -- --target bun-linux-x64

      - name: "Binary: version matches package.json"
        run: |
          # Build with VERSION pinned to package.json, then assert the
          # compiled binary reports it back. Catches drift between
          # package.json, build scripts, and fallback constants.
          # NOTE: scripts/build.ts reads VERSION, not BUILD_VERSION.
          PKG_VERSION=$(node -e 'console.log(require("./package.json").version)')
          VERSION="$PKG_VERSION" bun run build -- --target bun-linux-x64
          # Strip the citty "[log] " prefix and any quoting before grep.
          REPORTED=$(./dist/am-linux-x64 --version 2>&1 | head -1 | sed 's/\[log\] *//' | tr -d '"')
          if ! echo "$REPORTED" | grep -qF "$PKG_VERSION"; then
            echo "::error::Binary version '$REPORTED' does not match package.json '$PKG_VERSION'"
            exit 1
          fi
          echo "Version gate: PASS ($PKG_VERSION)"

      - name: Seed IDE configs
        run: |
          TEST_HOME=$(mktemp -d)
          echo "TEST_HOME=$TEST_HOME" >> "$GITHUB_ENV"

          mkdir -p "$TEST_HOME/.claude"
          printf '{"mcpServers":{"tavily":{"command":"bunx","args":["tavily-mcp@latest"]},"fetch":{"command":"uvx","args":["mcp-server-fetch"]},"context7":{"command":"bunx","args":["-y","@upstash/context7-mcp@latest"]}}}\n' > "$TEST_HOME/.claude.json"

          mkdir -p "$TEST_HOME/test-project"
          printf '{"mcpServers":{"project-server":{"command":"my-server","args":["--port","3000"]},"disabled-server":{"command":"old-server","args":[],"disabled":true}}}\n' > "$TEST_HOME/test-project/.mcp.json"

      - name: "Binary: version + help"
        run: |
          ./dist/am-linux-x64 version
          ./dist/am-linux-x64 --help | grep -q "Config commands" && echo "Grouped help: PASS"

      - name: "Binary: init + doctor"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 init --yes
          ./dist/am-linux-x64 doctor || true

      - name: "Binary: import from Claude Code"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 import claude-code --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'Imported: {data[\"imported\"]} servers')
          assert data['imported'] >= 3, f'Expected >=3 imported, got {data[\"imported\"]}'
          print('Import: PASS')
          "

      - name: "Binary: import from project .mcp.json"
        run: |
          export HOME="$TEST_HOME"
          cd "$TEST_HOME/test-project"
          "$GITHUB_WORKSPACE/dist/am-linux-x64" import claude-code --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'Imported: {data[\"imported\"]} (merged: {data[\"merged\"]})')
          "

      - name: "Binary: list servers"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 list servers --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          names = {s['name'] for s in data['servers']}
          print(f'{len(names)} servers: {sorted(names)}')
          assert 'tavily' in names, 'tavily missing'
          assert 'fetch' in names, 'fetch missing'
          print('List servers: PASS')
          "

      - name: "Binary: add + list round-trip"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 add server ci-test --command "echo test" --tags ci,test
          ./dist/am-linux-x64 list servers --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ts = next((s for s in data['servers'] if s['name'] == 'ci-test'), None)
          assert ts, 'ci-test not found'
          assert ts['command'] == 'echo test', f'Wrong command: {ts[\"command\"]}'
          assert 'ci' in ts['tags'], f'Missing ci tag: {ts[\"tags\"]}'
          print('Add + list: PASS')
          "

      - name: "Binary: add instruction + list entities"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 add instruction ci-rule --content "Always run tests" --scope always
          ./dist/am-linux-x64 list instructions --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          names = [i['name'] for i in data['instructions']]
          assert 'ci-rule' in names, 'ci-rule missing'
          print('Add instruction: PASS')
          "
          ./dist/am-linux-x64 list skills --json
          ./dist/am-linux-x64 list agents --json
          ./dist/am-linux-x64 list profiles --json

      - name: "Binary: status"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 status --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['servers'] > 0, 'No servers'
          print(f'Status: {data[\"servers\"]} servers, profile={data[\"profile\"]}')
          print('Status: PASS')
          "

      - name: "Binary: completions"
        run: |
          ./dist/am-linux-x64 completion bash | grep -q "init" && echo "Bash: PASS"
          ./dist/am-linux-x64 completion zsh | grep -q "init" && echo "Zsh: PASS"
          ./dist/am-linux-x64 completion fish | grep -q "init" && echo "Fish: PASS"

      - name: "Binary: marketplace + flow + adapter"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 marketplace list 2>&1 || true
          ./dist/am-linux-x64 flow list 2>&1 || true
          ./dist/am-linux-x64 adapter list 2>&1 || true

      - name: "Binary: undo"
        run: |
          export HOME="$TEST_HOME"
          ./dist/am-linux-x64 undo --json 2>&1 || true

      - name: Summary
        run: echo "Integration tests PASSED — compiled binary verified end-to-end"

  # Windows smoke leg (H1): the Windows build used to be continue-on-error, so
  # the .exe was compiled but never executed — "does Windows actually work?" was
  # unknown by construction. This job runs the actual compiled am-windows-x64.exe
  # through version / init / list so a runtime-broken Windows binary fails CI.
  # All steps use `shell: bash` (Git Bash ships on the windows runner).
  integration-windows:
    needs: test
    runs-on: blacksmith-2vcpu-windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile

      - name: Build Windows binary
        shell: bash
        run: VERSION=ci-test bun run build -- --target bun-windows-x64

      - name: "Artifact: am-windows-x64.exe produced and non-empty"
        shell: bash
        run: |
          set -euo pipefail
          EXE="dist/am-windows-x64.exe"
          if [ ! -f "$EXE" ]; then
            echo "::error::$EXE was not produced by the build"
            exit 1
          fi
          # Bun --compile binaries are tens of MB; anything tiny is a failed build.
          SIZE=$(wc -c < "$EXE")
          echo "Artifact size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::$EXE is suspiciously small ($SIZE bytes) — likely a broken build"
            exit 1
          fi
          echo "Windows artifact: PASS"

      - name: "Binary: version"
        shell: bash
        run: ./dist/am-windows-x64.exe version

      - name: "Binary: init + list"
        shell: bash
        run: |
          set -euo pipefail
          TEST_HOME=$(mktemp -d)
          export HOME="$TEST_HOME"
          # USERPROFILE is what Windows tooling reads; keep it aligned with HOME
          # so the binary writes its config under the throwaway temp dir.
          export USERPROFILE="$TEST_HOME"
          ./dist/am-windows-x64.exe init --yes
          ./dist/am-windows-x64.exe list servers --json
          echo "Windows smoke (version/init/list): PASS"

      - name: Summary
        run: echo "Windows integration smoke PASSED — compiled .exe verified"
