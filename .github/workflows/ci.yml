name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test with coverage
        run: bun test --coverage
      - name: Build all targets (smoke test)
        run: bun run build -- --all

  build-verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-2vcpu-ubuntu-2404
          - os: blacksmith-6vcpu-macos-latest
          - os: blacksmith-2vcpu-windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
