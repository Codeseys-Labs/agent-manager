name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run typecheck
      - name: Unit tests
        run: bun run test:unit
      - name: Integration tests
        run: bun run test:integration
      - name: Build (smoke test)
        run: bun run build
