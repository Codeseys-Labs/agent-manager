name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: am-darwin-arm64
            runner: macos-14
          - target: bun-darwin-x64
            artifact: am-darwin-x64
            runner: macos-13
          - target: bun-linux-x64
            artifact: am-linux-x64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            artifact: am-linux-arm64
            runner: ubuntu-latest
          - target: bun-windows-x64
            artifact: am-windows-x64.exe
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: Build
        run: VERSION="${GITHUB_REF_NAME#v}" bun run build --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun -e "const pkg = await Bun.file('package.json').json(); pkg.version = '$VERSION'; await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');"
      - name: Publish to npm
        run: bunx npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
