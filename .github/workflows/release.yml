name: Release
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-2vcpu-ubuntu-2404
            targets: "bun-linux-x64 bun-linux-arm64"
          - os: blacksmith-6vcpu-macos-latest
            targets: "bun-darwin-arm64 bun-darwin-x64"
          - os: blacksmith-2vcpu-windows-2025
            targets: "bun-windows-x64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build targets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for target in ${{ matrix.targets }}; do
            echo "::group::Building $target"
            VERSION="$VERSION" bun run build -- --target "$target"
            echo "::endgroup::"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/am-*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: ./artifacts
        run: |
          sha256sum am-* > checksums.sha256
          echo "--- checksums.sha256 ---"
          cat checksums.sha256

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the [Unreleased] section (everything between ## [Unreleased] and the next ## heading)
          NOTES=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[Unreleased\]/d;/^## \[/d;p}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            # Fallback: try to extract a versioned section
            NOTES=$(sed -n "/^## \\[${VERSION}\\]/,/^## \\[/{/^## \\[${VERSION}\\]/d;/^## \\[/d;p}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # Write to file for gh release (avoids delimiter escaping issues)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            ./artifacts/*

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Read checksums from artifacts
          SHA_DARWIN_ARM64=$(grep 'am-darwin-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_DARWIN_X64=$(grep 'am-darwin-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(grep 'am-linux-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_LINUX_X64=$(grep 'am-linux-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)

          # Regenerate formula from scratch (avoids fragile sed-on-previous-values)
          # Use 'RUBY' (quoted) to prevent shell expansion of Ruby's #{} interpolation
          cat > Formula/am.rb << 'RUBY'
          class Am < Formula
            desc "chezmoi for AI agent configs — define once in TOML, sync via git, generate native configs for every tool"
            homepage "https://github.com/Codeseys-Labs/agent-manager"
            version "RELEASE_VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-darwin-arm64"
                sha256 "RELEASE_SHA_DARWIN_ARM64"
              end
              on_intel do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-darwin-x64"
                sha256 "RELEASE_SHA_DARWIN_X64"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-linux-arm64"
                sha256 "RELEASE_SHA_LINUX_ARM64"
              end
              on_intel do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-linux-x64"
                sha256 "RELEASE_SHA_LINUX_X64"
              end
            end

            def install
              binary_name = stable.url.split("/").last
              bin.install binary_name => "am"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/am version")
            end

            def caveats
              <<~EOS
                To get started:
                  am init

                Then sync your config:
                  am apply
              EOS
            end
          end
          RUBY
          # Remove leading whitespace from heredoc and substitute values
          sed -i 's/^          //' Formula/am.rb
          sed -i "s/RELEASE_VERSION/${VERSION}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_DARWIN_X64/${SHA_DARWIN_X64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_LINUX_ARM64/${SHA_LINUX_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_LINUX_X64/${SHA_LINUX_X64}/" Formula/am.rb

          echo "Updated formula:"
          cat Formula/am.rb

      - name: Stamp CHANGELOG.md with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +%Y-%m-%d)
          # Replace [Unreleased] with [VERSION] - DATE
          sed -i "s/^## \[Unreleased\]/## [${VERSION}] - ${DATE}/" CHANGELOG.md
          # Add a fresh Unreleased section after the title line
          sed -i "/^# Changelog/a\\\n## [Unreleased]" CHANGELOG.md

      - name: Commit formula + changelog update
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/am.rb CHANGELOG.md
          git commit -m "chore(release): update formula + changelog for v${VERSION}" || echo "No changes to commit"
          git push origin HEAD:main

      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun -e "
            const pkg = await Bun.file('package.json').json();
            pkg.version = '$VERSION';
            await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: bunx npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
