name: Release
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-2vcpu-ubuntu-2404
            targets: "bun-linux-x64 bun-linux-arm64"
          - os: blacksmith-6vcpu-macos-latest
            targets: "bun-darwin-arm64 bun-darwin-x64"
          - os: blacksmith-2vcpu-windows-2025
            targets: "bun-windows-x64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile

      - name: Build targets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for target in ${{ matrix.targets }}; do
            echo "::group::Building $target"
            VERSION="$VERSION" bun run build -- --target "$target"
            echo "::endgroup::"
          done

      # macOS-only: ad-hoc sign the darwin binaries. Bun emits binaries with
      # an ad-hoc/linker signature by default on macOS, but actions/upload-artifact
      # zips files and STRIPS extended attributes including codesign signatures.
      # Without a valid signature, macOS 14+ arm64 SIGKILLs on exec (exit 137).
      # Re-sign before upload so the artifact retains a signature through the
      # zip round-trip. Ad-hoc is sufficient for Gatekeeper once the user runs
      # `xattr -dr com.apple.quarantine` or the download came via a tool that
      # didn't set the quarantine bit.
      - name: Ad-hoc sign darwin binaries (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in dist/am-darwin-*; do
            echo "Signing $bin"
            codesign -s - --force --timestamp=none "$bin"
            codesign -dv "$bin" 2>&1 | head -3
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/am-*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      # Even with ad-hoc signing applied on the builder, the round-trip
      # through actions/upload-artifact (which zips, strips xattrs, then
      # actions/download-artifact unpacks) can strip the signature again.
      # This job runs on Linux so we can't codesign here — but we CAN
      # document the expectation and fail loudly if the darwin binaries
      # lack a Mach-O LC_CODE_SIGNATURE load command. Users will need to
      # either trust the ad-hoc signature (macOS usually accepts it in
      # place) or re-sign locally after download.
      # TODO: migrate this job to macOS so we can re-sign on the release
      # runner, or use a self-hosted Apple-ID-signed runner for production
      # macOS distribution.

      - name: Generate checksums
        working-directory: ./artifacts
        run: |
          sha256sum am-* > checksums.sha256
          echo "--- checksums.sha256 ---"
          cat checksums.sha256

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the [Unreleased] section (everything between ## [Unreleased] and the next ## heading)
          NOTES=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[Unreleased\]/d;/^## \[/d;p}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            # Fallback: try to extract a versioned section
            NOTES=$(sed -n "/^## \\[${VERSION}\\]/,/^## \\[/{/^## \\[${VERSION}\\]/d;/^## \\[/d;p}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # Write to file for gh release (avoids delimiter escaping issues)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark any tag containing "-rc", "-alpha", or "-beta" as a GitHub prerelease
          # so these don't appear as "latest" until the stable version ships.
          # GITHUB_REF_NAME is set by the runner and not user-controlled; safe to interpolate.
          PRERELEASE_FLAG=""
          if [[ "$GITHUB_REF_NAME" =~ -(rc|alpha|beta) ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            ./artifacts/*

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Read checksums from artifacts. ADR-0033 Phase B / REV-5 HIGH-1:
          # we now ship TWO binaries per platform (am + am-acp-shell). Tier-2
          # shim wrappers fail at runtime with ENOENT unless both are installed.
          SHA_DARWIN_ARM64=$(grep 'am-darwin-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_DARWIN_X64=$(grep 'am-darwin-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(grep 'am-linux-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_LINUX_X64=$(grep 'am-linux-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_SHELL_DARWIN_ARM64=$(grep 'am-acp-shell-darwin-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_SHELL_DARWIN_X64=$(grep 'am-acp-shell-darwin-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_SHELL_LINUX_ARM64=$(grep 'am-acp-shell-linux-arm64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)
          SHA_SHELL_LINUX_X64=$(grep 'am-acp-shell-linux-x64$' ./artifacts/checksums.sha256 | cut -d' ' -f1)

          # Regenerate formula from scratch (avoids fragile sed-on-previous-values)
          # Use 'RUBY' (quoted) to prevent shell expansion of Ruby's #{} interpolation
          cat > Formula/am.rb << 'RUBY'
          class Am < Formula
            desc "control plane for AI agents — catalog, MCP gateway, protocol router (ACP/A2A), marketplace"
            homepage "https://github.com/Codeseys-Labs/agent-manager"
            version "RELEASE_VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-darwin-arm64"
                sha256 "RELEASE_SHA_DARWIN_ARM64"
                resource "am-acp-shell" do
                  url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-acp-shell-darwin-arm64"
                  sha256 "RELEASE_SHA_SHELL_DARWIN_ARM64"
                end
              end
              on_intel do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-darwin-x64"
                sha256 "RELEASE_SHA_DARWIN_X64"
                resource "am-acp-shell" do
                  url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-acp-shell-darwin-x64"
                  sha256 "RELEASE_SHA_SHELL_DARWIN_X64"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-linux-arm64"
                sha256 "RELEASE_SHA_LINUX_ARM64"
                resource "am-acp-shell" do
                  url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-acp-shell-linux-arm64"
                  sha256 "RELEASE_SHA_SHELL_LINUX_ARM64"
                end
              end
              on_intel do
                url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-linux-x64"
                sha256 "RELEASE_SHA_LINUX_X64"
                resource "am-acp-shell" do
                  url "https://github.com/Codeseys-Labs/agent-manager/releases/download/v#{version}/am-acp-shell-linux-x64"
                  sha256 "RELEASE_SHA_SHELL_LINUX_X64"
                end
              end
            end

            def install
              # Primary binary: install the downloaded artifact as `am`.
              binary_name = stable.url.split("/").last
              bin.install binary_name => "am"
              # Tier-2 shim binary: fetch + install as `am-acp-shell`.
              resource("am-acp-shell").stage do
                shell_binary = Dir["am-acp-shell-*"].first
                bin.install shell_binary => "am-acp-shell"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/am version")
            end

            def caveats
              <<~EOS
                To get started:
                  am init

                Then sync your config:
                  am apply

                To use a Tier-2 wrapped agent (aider / amazon-q / cody):
                  am agent enable-shim <name> --yes
                Tier-2 wrappers inherit the underlying CLI's trust posture.
                See ADR-0033 for the security caveat.
              EOS
            end
          end
          RUBY
          # Remove leading whitespace from heredoc and substitute values
          sed -i 's/^          //' Formula/am.rb
          sed -i "s/RELEASE_VERSION/${VERSION}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_DARWIN_X64/${SHA_DARWIN_X64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_LINUX_ARM64/${SHA_LINUX_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_LINUX_X64/${SHA_LINUX_X64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_SHELL_DARWIN_ARM64/${SHA_SHELL_DARWIN_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_SHELL_DARWIN_X64/${SHA_SHELL_DARWIN_X64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_SHELL_LINUX_ARM64/${SHA_SHELL_LINUX_ARM64}/" Formula/am.rb
          sed -i "s/RELEASE_SHA_SHELL_LINUX_X64/${SHA_SHELL_LINUX_X64}/" Formula/am.rb

          echo "Updated formula:"
          cat Formula/am.rb

      - name: Stamp CHANGELOG.md with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +%Y-%m-%d)
          # Replace [Unreleased] with [VERSION] - DATE
          sed -i "s/^## \[Unreleased\]/## [${VERSION}] - ${DATE}/" CHANGELOG.md
          # Add a fresh Unreleased section after the title line
          sed -i "/^# Changelog/a\\\n## [Unreleased]" CHANGELOG.md

      - name: Commit formula + changelog update
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/am.rb CHANGELOG.md
          git commit -m "chore(release): update formula + changelog for v${VERSION}" || echo "No changes to commit"
          git push origin HEAD:main

      - uses: useblacksmith/setup-bun@v1
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun -e "
            const pkg = await Bun.file('package.json').json();
            pkg.version = '$VERSION';
            await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: bunx npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
