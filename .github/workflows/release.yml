name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: Build
        run: VERSION="${GITHUB_REF_NAME#v}" bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: am-darwin-arm64
          path: dist/am-darwin-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
