<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-manager — Login</title>
  <style>
    :root {
      --bg: #fafafa;
      --bg2: #fff;
      --fg: #111;
      --fg2: #555;
      --border: #ddd;
      --accent: #2563eb;
      --radius: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --bg2: #1a1a1a;
        --fg: #e5e5e5;
        --fg2: #999;
        --border: #333;
        --accent: #3b82f6;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--fg2); font-size: 0.85rem; margin-bottom: 2rem; }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #24292e;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--fg2);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>agent-manager</h1>
    <p class="subtitle">MCP server configuration dashboard</p>
    <a href="/auth/github/login" class="login-btn">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
        -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
        -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
        .64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92
        .08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07
        -.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Login with GitHub
    </a>
    <p class="note">
      Authenticates via GitHub OAuth to access your config repo.<br>
      Requires <code>repo</code> scope for reading and writing config.toml.
    </p>
  </div>
</body>
</html>
