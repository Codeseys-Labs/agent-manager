<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-manager</title>
  <style>
    :root {
      --bg: #fafafa;
      --bg2: #fff;
      --fg: #111;
      --fg2: #555;
      --border: #ddd;
      --accent: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #ca8a04;
      --radius: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --bg2: #1a1a1a;
        --fg: #e5e5e5;
        --fg2: #999;
        --border: #333;
        --accent: #3b82f6;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #eab308;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: var(--bg);
      color: var(--fg);
      padding: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.05em; }
    .subtitle { color: var(--fg2); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .status-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat { text-align: center; }
    .stat .value { font-size: 1.5rem; font-weight: 700; }
    .stat .label { font-size: 0.75rem; color: var(--fg2); text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem; border-bottom: 2px solid var(--border); color: var(--fg2); font-weight: 600; }
    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-active { background: var(--green); color: #fff; }
    .badge-disabled { background: var(--fg2); color: #fff; }
    .badge-sync { background: var(--green); color: #fff; }
    .badge-drift { background: var(--yellow); color: #000; }
    .badge-unknown { background: var(--fg2); color: #fff; }
    .badge-current { background: var(--accent); color: #fff; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    button {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--fg);
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--border); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
    select {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--fg);
    }
    .profile-switcher { display: flex; align-items: center; gap: 0.5rem; }
    .loading { color: var(--fg2); font-style: italic; }
    #git-info { font-size: 0.8rem; color: var(--fg2); }
    /* Cloud mode: login prompt and repo selector */
    .cloud-login { text-align: center; margin: 3rem auto; max-width: 400px; }
    .cloud-login a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.5rem; border-radius: var(--radius);
      background: #24292e; color: #fff; text-decoration: none;
      font-size: 0.9rem; transition: opacity 0.15s;
    }
    .cloud-login a:hover { opacity: 0.85; }
    .user-info { display: flex; align-items: center; gap: 0.5rem; float: right; font-size: 0.8rem; color: var(--fg2); }
    .user-info img { width: 24px; height: 24px; border-radius: 50%; }
    .user-info a { color: var(--fg2); text-decoration: none; margin-left: 0.5rem; }
    .repo-selector { margin-bottom: 1.5rem; }
    .repo-selector select { width: 100%; padding: 0.5rem; }
  </style>
</head>
<body>
  <!-- Cloud mode: user info + logout (hidden in local mode) -->
  <div id="user-bar" class="user-info" style="display:none;"></div>

  <h1>agent-manager</h1>
  <p class="subtitle">MCP server configuration dashboard</p>

  <!-- Cloud mode: login prompt (shown when not authenticated in cloud) -->
  <div id="cloud-login" class="cloud-login card" style="display:none;">
    <p style="margin-bottom:1rem;">Sign in to manage your config repo</p>
    <a href="/auth/github/login">Login with GitHub</a>
  </div>

  <!-- Cloud mode: repo selector (shown after login in cloud) -->
  <div id="repo-selector" class="repo-selector card" style="display:none;">
    <label><strong>Config repo:</strong></label>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
      <select id="repo-select"><option>Loading repos...</option></select>
      <button id="btn-select-repo" class="primary">Select</button>
    </div>
  </div>

  <div class="status-bar card" id="status-bar">
    <div class="stat">
      <div class="value" id="server-count">-</div>
      <div class="label">Servers</div>
    </div>
    <div class="stat">
      <div class="value" id="profile-name">-</div>
      <div class="label">Profile</div>
    </div>
    <div class="stat">
      <div class="value" id="git-branch">-</div>
      <div class="label">Branch</div>
    </div>
    <div class="stat">
      <div class="value" id="git-status">-</div>
      <div class="label">Git</div>
    </div>
  </div>

  <h2>Profiles</h2>
  <div class="card">
    <div class="profile-switcher">
      <select id="profile-select"><option>Loading...</option></select>
      <button id="btn-switch" class="primary">Switch</button>
    </div>
  </div>

  <h2>MCP Servers</h2>
  <div class="card">
    <table>
      <thead><tr><th>Name</th><th>Command</th><th>Transport</th><th>Tags</th><th>Status</th></tr></thead>
      <tbody id="servers-body"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>

  <h2>Tool Sync Status</h2>
  <div class="card">
    <table>
      <thead><tr><th>Tool</th><th>Status</th><th>Changes</th></tr></thead>
      <tbody id="tools-body"><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>

  <h2>Actions</h2>
  <div class="card">
    <div class="actions">
      <button id="btn-apply" class="primary">Apply Config</button>
      <button id="btn-pull">Git Pull</button>
      <button id="btn-push">Git Push</button>
    </div>
    <p id="git-info" style="margin-top: 0.75rem;"></p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const toast = (msg, type = "success") => {
      const el = $("#toast");
      el.textContent = msg;
      el.className = "toast show " + type;
      setTimeout(() => el.className = "toast", 3000);
    };

    async function api(path, opts) {
      try {
        const res = await fetch(path, opts);
        return await res.json();
      } catch (e) {
        toast("Request failed: " + e.message, "error");
        return null;
      }
    }

    // Safe DOM builder — avoids innerHTML for XSS safety.
    // All user-facing text is inserted via textContent.
    function createCell(text, opts) {
      const td = document.createElement("td");
      if (opts && opts.strong) {
        const b = document.createElement("strong");
        b.textContent = text;
        td.appendChild(b);
      } else if (opts && opts.code) {
        const c = document.createElement("code");
        c.textContent = text;
        td.appendChild(c);
      } else {
        td.textContent = text;
      }
      return td;
    }

    function createBadge(text, className) {
      const span = document.createElement("span");
      span.className = "badge " + className;
      span.textContent = text;
      const td = document.createElement("td");
      td.appendChild(span);
      return td;
    }

    async function loadServers() {
      const data = await api("/api/servers");
      if (!data) return;
      const body = $("#servers-body");
      body.replaceChildren();
      if (!data.servers || data.servers.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 5;
        td.textContent = "No servers configured";
        tr.appendChild(td);
        body.appendChild(tr);
        return;
      }
      for (const s of data.servers) {
        const tr = document.createElement("tr");
        tr.appendChild(createCell(s.name, { strong: true }));
        tr.appendChild(createCell(s.command, { code: true }));
        tr.appendChild(createCell(s.transport));
        tr.appendChild(createCell(s.tags.join(", ") || "-"));
        tr.appendChild(createBadge(
          s.enabled ? "active" : "disabled",
          s.enabled ? "badge-active" : "badge-disabled"
        ));
        body.appendChild(tr);
      }
    }

    async function loadProfiles() {
      const data = await api("/api/profiles");
      if (!data) return;
      const select = $("#profile-select");
      select.replaceChildren();
      if (!data.profiles || data.profiles.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No profiles";
        select.appendChild(opt);
        return;
      }
      for (const p of data.profiles) {
        const opt = document.createElement("option");
        opt.value = p.name;
        opt.textContent = p.name + (p.inherits ? " (inherits: " + p.inherits + ")" : "");
        opt.selected = p.active;
        select.appendChild(opt);
      }
    }

    async function loadStatus() {
      const data = await api("/api/status");
      if (!data) return;
      $("#server-count").textContent = data.servers ?? 0;
      $("#profile-name").textContent = data.profile ?? "-";
      $("#git-branch").textContent = data.git?.branch ?? "-";
      $("#git-status").textContent = data.git?.clean ? "clean" : (data.git?.dirty?.length ?? 0) + " dirty";

      const remotes = data.git?.remotes ?? [];
      const gitInfo = $("#git-info");
      gitInfo.textContent = remotes.length > 0
        ? "Remote: " + remotes[0].url
        : "No remote configured";

      const toolsBody = $("#tools-body");
      toolsBody.replaceChildren();
      if (!data.tools || data.tools.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 3;
        td.textContent = "No tools detected";
        tr.appendChild(td);
        toolsBody.appendChild(tr);
        return;
      }
      for (const t of data.tools) {
        const cls = t.status === "in-sync" ? "badge-sync"
          : t.status === "drifted" ? "badge-drift" : "badge-unknown";
        const tr = document.createElement("tr");
        tr.appendChild(createCell(t.displayName));
        tr.appendChild(createBadge(t.status, cls));
        tr.appendChild(createCell(String(t.changes)));
        toolsBody.appendChild(tr);
      }
    }

    // Actions
    $("#btn-switch").addEventListener("click", async () => {
      const profile = $("#profile-select").value;
      if (!profile) return;
      const data = await api("/api/profile/use", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ profile }),
      });
      if (data?.action === "use") {
        toast("Switched to profile: " + profile);
        loadStatus();
        loadProfiles();
      } else {
        toast(data?.error ?? "Switch failed", "error");
      }
    });

    $("#btn-apply").addEventListener("click", async () => {
      const btn = $("#btn-apply");
      btn.disabled = true;
      btn.textContent = "Applying...";
      const data = await api("/api/apply", { method: "POST" });
      btn.disabled = false;
      btn.textContent = "Apply Config";
      if (data?.results) {
        const total = data.results.reduce((n, r) => n + r.files.filter(f => f.written).length, 0);
        toast("Applied: " + total + " file(s) written");
        loadStatus();
      } else {
        toast(data?.error ?? "Apply failed", "error");
      }
    });

    $("#btn-pull").addEventListener("click", async () => {
      const btn = $("#btn-pull");
      btn.disabled = true;
      const data = await api("/api/sync/pull", { method: "POST" });
      btn.disabled = false;
      if (data?.success) {
        toast("Pull complete");
        loadAll();
      } else {
        toast(data?.error ?? "Pull failed", "error");
      }
    });

    $("#btn-push").addEventListener("click", async () => {
      const btn = $("#btn-push");
      btn.disabled = true;
      const data = await api("/api/sync/push", { method: "POST" });
      btn.disabled = false;
      if (data?.success) {
        toast("Push complete");
        loadStatus();
      } else {
        toast(data?.error ?? "Push failed", "error");
      }
    });

    // SSE for real-time updates
    function connectSSE() {
      const es = new EventSource("/api/events");
      es.addEventListener("status", (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.git) {
            $("#git-branch").textContent = data.git.branch ?? "-";
            $("#git-status").textContent = data.git.clean ? "clean" : data.git.dirty + " dirty";
          }
        } catch { /* ignore parse errors */ }
      });
      es.onerror = () => {
        es.close();
        setTimeout(connectSSE, 5000);
      };
    }

    function loadAll() {
      loadServers();
      loadProfiles();
      loadStatus();
    }

    // --- Cloud mode detection ---
    // If /auth/check exists and returns JSON, we are in cloud (Workers) mode.
    // In local mode (`am serve`), /auth/check returns 404 and we skip auth entirely.

    let cloudMode = false;
    let selectedRepo = null; // { owner, repo }

    async function detectCloudMode() {
      try {
        const res = await fetch("/auth/check");
        if (!res.ok) return false; // local mode — no auth endpoint
        const data = await res.json();
        if (data.authenticated !== undefined) {
          cloudMode = true;
          if (data.authenticated && data.user) {
            showUserBar(data.user);
            await loadRepos();
          } else {
            document.getElementById("cloud-login").style.display = "block";
          }
          return true;
        }
      } catch { /* local mode */ }
      return false;
    }

    function showUserBar(user) {
      const bar = document.getElementById("user-bar");
      bar.style.display = "flex";
      bar.replaceChildren();
      if (user.avatar) {
        const img = document.createElement("img");
        img.src = user.avatar;
        img.alt = user.login;
        bar.appendChild(img);
      }
      const span = document.createElement("span");
      span.textContent = user.login;
      bar.appendChild(span);
      const logout = document.createElement("a");
      logout.href = "#";
      logout.textContent = "Logout";
      logout.addEventListener("click", async (e) => {
        e.preventDefault();
        await fetch("/auth/logout", { method: "POST" });
        window.location.reload();
      });
      bar.appendChild(logout);
    }

    async function loadRepos() {
      const data = await api("/api/repos");
      if (!data || !Array.isArray(data)) return;
      const sel = document.getElementById("repo-select");
      sel.replaceChildren();
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "-- select a config repo --";
      sel.appendChild(placeholder);
      for (const r of data) {
        const opt = document.createElement("option");
        opt.value = r.name;
        opt.textContent = r.name + (r.private ? " (private)" : "");
        sel.appendChild(opt);
      }
      document.getElementById("repo-selector").style.display = "block";
    }

    // Repo selection
    document.getElementById("btn-select-repo")?.addEventListener("click", async () => {
      const val = document.getElementById("repo-select").value;
      if (!val) return;
      const [owner, repo] = val.split("/");
      selectedRepo = { owner, repo };
      document.getElementById("repo-selector").style.display = "none";
      loadCloudDashboard();
    });

    async function loadCloudDashboard() {
      if (!selectedRepo) return;
      const { owner, repo } = selectedRepo;

      // Load servers from the selected repo
      const serversData = await api("/api/servers/" + owner + "/" + repo);
      if (serversData && serversData.servers) {
        const body = document.getElementById("servers-body");
        body.replaceChildren();
        for (const s of serversData.servers) {
          const tr = document.createElement("tr");
          tr.appendChild(createCell(s.name, { strong: true }));
          tr.appendChild(createCell(s.command, { code: true }));
          tr.appendChild(createCell("-")); // transport not in cloud API
          tr.appendChild(createCell((s.tags ?? []).join(", ") || "-"));
          tr.appendChild(createBadge(
            s.enabled ? "active" : "disabled",
            s.enabled ? "badge-active" : "badge-disabled"
          ));
          body.appendChild(tr);
        }
        document.getElementById("server-count").textContent = serversData.servers.length;
      }

      // Update status bar for cloud mode
      document.getElementById("profile-name").textContent = "cloud";
      document.getElementById("git-branch").textContent = owner + "/" + repo;
      document.getElementById("git-status").textContent = "remote";
    }

    // --- Startup ---
    (async () => {
      const isCloud = await detectCloudMode();
      if (!isCloud) {
        // Local mode — load everything directly
        loadAll();
        setInterval(loadStatus, 30000);
        connectSSE();
      }
    })();
  </script>
</body>
</html>
